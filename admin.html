<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RAG 知識庫管理 — 業務練習器</title>
<!-- File parsing libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px;
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #0f172a; color: #e2e8f0;
    min-height: 100vh;
  }
  h1 { margin: 0 0 16px; font-size: 24px; }
  h2 { margin: 24px 0 12px; font-size: 18px; color: #a5b4fc; }
  .wrap { max-width: 960px; margin: 0 auto; }
  .card {
    background: rgba(30,41,59,0.7);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 18px 20px; margin-bottom: 18px;
  }
  label { display: block; font-size: 13px; color: rgba(255,255,255,0.6); margin: 10px 0 4px; }
  input, select, textarea, button {
    font: inherit; color: inherit;
    background: rgba(15,23,42,0.8);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; padding: 9px 12px; width: 100%;
  }
  textarea { min-height: 180px; resize: vertical; font-family: ui-monospace, monospace; font-size: 13px; }
  button {
    background: linear-gradient(135deg,#6366f1,#a855f7);
    border: none; cursor: pointer; font-weight: 600;
    padding: 10px 16px; width: auto;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.danger { background: #ef4444; }
  button.ghost { background: transparent; border: 1px solid rgba(255,255,255,0.15); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .row > * { flex: 1; min-width: 180px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  th { color: rgba(255,255,255,0.5); font-weight: 500; font-size: 12px; text-transform: uppercase; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; background: rgba(99,102,241,0.2); color: #a5b4fc; }
  .pill.ok { background: rgba(34,197,94,0.2); color: #86efac; }
  .muted { color: rgba(255,255,255,0.45); font-size: 13px; }
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(99,102,241,0.95); color: white;
    padding: 10px 18px; border-radius: 8px; z-index: 999;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .toast.err { background: rgba(239,68,68,0.95); }

  /* Drop zone */
  #dropZone {
    border: 2px dashed rgba(99,102,241,0.4);
    border-radius: 10px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 14px;
    user-select: none;
  }
  #dropZone:hover, #dropZone.over {
    border-color: rgba(99,102,241,0.85);
    background: rgba(99,102,241,0.07);
  }
  #dropZone.parsing {
    border-color: rgba(245,158,11,0.7);
    background: rgba(245,158,11,0.06);
  }
  #dropZone.done {
    border-color: rgba(34,197,94,0.7);
    background: rgba(34,197,94,0.06);
  }
  #dropZone .icon { font-size: 32px; margin-bottom: 8px; }
  #dropZone .hint { font-size: 14px; color: rgba(255,255,255,0.55); }
  #dropZone .hint b { color: #a5b4fc; }
  #dropZone .formats { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 5px; }
  #fileInput { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>📚 RAG 知識庫管理</h1>

  <div class="card" id="authBlock">
    <h2>1. 管理員登入</h2>
    <label>Worker URL</label>
    <input id="workerUrl" placeholder="https://sales-roleplay-worker.your-subdomain.workers.dev">
    <label>Admin Token</label>
    <input id="adminToken" type="password" placeholder="ADMIN_TOKEN">
    <div style="margin-top:12px; display:flex; gap:8px;">
      <button id="loginBtn">進入</button>
      <button class="ghost" id="logoutBtn" style="display:none">登出</button>
    </div>
  </div>

  <div id="mainBlock" style="display:none">
    <div class="card">
      <h2>2. 上傳文件</h2>

      <!-- Drop zone -->
      <div id="dropZone">
        <div class="icon">📂</div>
        <div class="hint">拖曳檔案到這裡，或 <b>點擊選擇檔案</b></div>
        <div class="formats">支援：PDF、Word（.docx）、Excel（.xlsx / .xls / .csv）、純文字（.txt / .md）</div>
        <div class="hint" id="dropStatus" style="margin-top:8px"></div>
      </div>
      <input type="file" id="fileInput" accept=".pdf,.docx,.xlsx,.xls,.csv,.txt,.md">

      <div class="row">
        <div>
          <label>文件 ID（英數 + 底線，唯一）</label>
          <input id="docId" placeholder="appguard-datasheet-v2">
        </div>
        <div>
          <label>文件名稱（顯示用）</label>
          <input id="docName" placeholder="appGuard 產品簡介">
        </div>
      </div>
      <label>對應產品</label>
      <select id="docProduct">
        <option value="general">通用 / 全部</option>
      </select>
      <label>解析出的文字內容（可在此校對後再上傳）</label>
      <textarea id="docText" placeholder="拖曳或選擇檔案後自動填入，也可直接貼上純文字..."></textarea>
      <div style="margin-top:12px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
        <button id="uploadBtn">上傳並建立索引</button>
        <span class="muted" id="uploadStatus"></span>
      </div>
    </div>

    <div class="card">
      <h2>3. 文件清單</h2>
      <div style="margin-bottom:10px;">
        <button class="ghost" id="refreshBtn">重新整理</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>文件名稱</th><th>ID</th><th>產品</th><th>chunks</th><th>上傳時間</th><th>狀態</th><th></th>
          </tr>
        </thead>
        <tbody id="docsTbody"></tbody>
      </table>
      <div class="muted" id="docsEmpty" style="padding:16px; text-align:center; display:none">尚無文件</div>
    </div>
  </div>
</div>

<script>
const PRODUCTS = ["appGuard","Ciro","Akamai API Security","OKTA","CyberArk","Aware","Bitsight","Cyble","Fortify","Security Scorecard","Trellix DLP"];

// Set pdf.js worker
if (typeof pdfjsLib !== 'undefined') {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

const $ = id => document.getElementById(id);
let workerUrl = sessionStorage.getItem('ragWorkerUrl') || '';
let adminToken = sessionStorage.getItem('ragAdminToken') || '';

function toast(msg, isErr) {
  const t = document.createElement('div');
  t.className = 'toast' + (isErr ? ' err' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function api(path, opts = {}) {
  return fetch(workerUrl.replace(/\/$/, '') + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'X-Admin-Token': adminToken,
      ...(opts.headers || {}),
    },
  }).then(async r => {
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
    return data;
  });
}

function renderProducts() {
  const sel = $('docProduct');
  PRODUCTS.forEach(p => {
    const o = document.createElement('option');
    o.value = p; o.textContent = p;
    sel.appendChild(o);
  });
}

// ── File name → docId / guess product ──────────────────────────
function nameToId(filename) {
  return filename.replace(/\.[^.]+$/, '').toLowerCase()
    .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 64) || 'doc-' + Date.now();
}

function guessProduct(filename) {
  const lower = filename.toLowerCase();
  return PRODUCTS.find(p => lower.includes(p.toLowerCase())) || null;
}

// ── Parsers ─────────────────────────────────────────────────────
async function parsePDF(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const parts = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const line = content.items.map(it => it.str).join(' ').trim();
    if (line) parts.push(line);
  }
  return parts.join('\n\n');
}

async function parseDocx(file) {
  const buf = await file.arrayBuffer();
  const result = await mammoth.extractRawText({ arrayBuffer: buf });
  return result.value.trim();
}

async function parseExcel(file) {
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: 'array' });
  const parts = [];
  wb.SheetNames.forEach(name => {
    const ws = wb.Sheets[name];
    const csv = XLSX.utils.sheet_to_csv(ws, { blankrows: false });
    if (csv.trim()) parts.push(`=== ${name} ===\n${csv.trim()}`);
  });
  return parts.join('\n\n');
}

async function parseTxt(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result.trim());
    r.onerror = rej;
    r.readAsText(file, 'UTF-8');
  });
}

async function parseFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'pdf') return parsePDF(file);
  if (ext === 'docx') return parseDocx(file);
  if (['xlsx','xls','csv'].includes(ext)) return parseExcel(file);
  if (['txt','md'].includes(ext)) return parseTxt(file);
  throw new Error(`不支援的格式：.${ext}`);
}

function dropState(state, msg) {
  const dz = $('dropZone');
  dz.className = state ? state : '';
  $('dropStatus').textContent = msg || '';
}

async function handleFile(file) {
  if (!file) return;
  dropState('parsing', `解析中：${file.name}...`);
  try {
    const text = await parseFile(file);
    $('docText').value = text;
    // auto-fill ID and name if empty
    if (!$('docId').value) $('docId').value = nameToId(file.name);
    if (!$('docName').value) $('docName').value = file.name.replace(/\.[^.]+$/, '');
    // auto-select product if guessable
    const p = guessProduct(file.name);
    if (p) $('docProduct').value = p;
    const words = text.split(/\s+/).length;
    dropState('done', `✅ 解析完成（約 ${words.toLocaleString()} 字）。請確認內容後按「上傳並建立索引」。`);
  } catch (e) {
    dropState('', '');
    toast('解析失敗：' + e.message, true);
  }
}

// Drop zone events
const dz = $('dropZone');
dz.addEventListener('click', () => $('fileInput').click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('over');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});
$('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) handleFile(file);
  e.target.value = '';
});

// ── Docs list ────────────────────────────────────────────────────
async function loadDocs() {
  $('docsTbody').innerHTML = '<tr><td colspan="7" class="muted" style="text-align:center;padding:16px">載入中...</td></tr>';
  try {
    const { docs } = await api('/docs');
    const tbody = $('docsTbody');
    tbody.innerHTML = '';
    $('docsEmpty').style.display = docs.length ? 'none' : 'block';
    for (const d of docs) {
      const tr = document.createElement('tr');
      const when = d.uploadedAt ? new Date(d.uploadedAt).toLocaleString('zh-TW') : '-';
      tr.innerHTML = `
        <td>${escapeHtml(d.name)}</td>
        <td><code style="font-size:12px;color:rgba(255,255,255,0.55)">${escapeHtml(d.id)}</code></td>
        <td><span class="pill">${escapeHtml(d.product || 'general')}</span></td>
        <td>${d.chunkCount || 0}</td>
        <td class="muted">${when}</td>
        <td><span class="pill ok">${escapeHtml(d.status || 'ready')}</span></td>
        <td><button class="danger" data-id="${escapeHtml(d.id)}">刪除</button></td>
      `;
      tbody.appendChild(tr);
    }
    tbody.querySelectorAll('button.danger').forEach(b => {
      b.addEventListener('click', () => deleteDoc(b.dataset.id));
    });
  } catch (e) {
    $('docsTbody').innerHTML = '';
    toast('載入失敗：' + e.message, true);
  }
}

async function deleteDoc(id) {
  if (!confirm(`確定刪除「${id}」？此動作無法復原。`)) return;
  try {
    await api('/docs/' + encodeURIComponent(id), { method: 'DELETE' });
    toast('已刪除');
    loadDocs();
  } catch (e) {
    toast('刪除失敗：' + e.message, true);
  }
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── Auth ─────────────────────────────────────────────────────────
$('loginBtn').addEventListener('click', () => {
  workerUrl = $('workerUrl').value.trim();
  adminToken = $('adminToken').value.trim();
  if (!workerUrl || !adminToken) { toast('請填入 Worker URL 與 Admin Token', true); return; }
  sessionStorage.setItem('ragWorkerUrl', workerUrl);
  sessionStorage.setItem('ragAdminToken', adminToken);
  $('authBlock').style.display = 'none';
  $('mainBlock').style.display = 'block';
  $('logoutBtn').style.display = 'inline-block';
  loadDocs();
});

$('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('ragWorkerUrl');
  sessionStorage.removeItem('ragAdminToken');
  workerUrl = adminToken = '';
  $('authBlock').style.display = 'block';
  $('mainBlock').style.display = 'none';
  $('logoutBtn').style.display = 'none';
});

$('refreshBtn').addEventListener('click', loadDocs);

// ── Upload ────────────────────────────────────────────────────────
$('uploadBtn').addEventListener('click', async () => {
  const docId = $('docId').value.trim();
  const name = $('docName').value.trim();
  const product = $('docProduct').value;
  const text = $('docText').value.trim();
  if (!docId || !name || !text) { toast('文件 ID、名稱、內容皆為必填', true); return; }
  if (!/^[\w\-]+$/.test(docId)) { toast('文件 ID 僅允許英數字、底線、連字號', true); return; }
  const btn = $('uploadBtn');
  btn.disabled = true;
  $('uploadStatus').textContent = '正在切塊並建立向量索引...';
  try {
    const res = await api('/upload', {
      method: 'POST',
      body: JSON.stringify({ docId, name, product, text }),
    });
    toast(`✅ 已建立 ${res.chunkCount} 個向量`);
    $('docText').value = '';
    $('docId').value = '';
    $('docName').value = '';
    dropState('', '');
    loadDocs();
  } catch (e) {
    toast('上傳失敗：' + e.message, true);
  } finally {
    btn.disabled = false;
    $('uploadStatus').textContent = '';
  }
});

// ── Init ──────────────────────────────────────────────────────────
renderProducts();
if (workerUrl && adminToken) {
  $('workerUrl').value = workerUrl;
  $('adminToken').value = adminToken;
  $('authBlock').style.display = 'none';
  $('mainBlock').style.display = 'block';
  $('logoutBtn').style.display = 'inline-block';
  loadDocs();
}
</script>
</body>
</html>
