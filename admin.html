<script>
const PRODUCTS = ["appGuard","Ciro","Akamai API Security","OKTA","CyberArk","Aware","Bitsight","Cyble","Fortify","Security Scorecard","Trellix DLP"];

};

const FIREBASE_CFG = {

if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CFG);

const db = firebase.firestore();

// Drive access token (obtained via GIS token client when Picker is first opened)
let driveAccessToken = null;
let currentUser = null;

// Set pdf.js worker
if (typeof pdfjsLib !== 'undefined') {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

const $ = id => document.getElementById(id);

function toast(msg, isErr) {
  const t = document.createElement('div');
  t.className = 'toast' + (isErr ? ' err' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// Call Worker /embed to get a 768-dim vector for given text
async function embedText(text) {
  if (!CONFIG.workerUrl || !CONFIG.appToken) throw new Error('Worker URL 或 APP_TOKEN 未設定（見 CONFIG）');
  const res = await fetch(CONFIG.workerUrl.replace(/\/$/, '') + '/embed', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-App-Token': CONFIG.appToken },
    body: JSON.stringify({ text }),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `Embed HTTP ${res.status}`);
  return data.values;
}

// Client-side chunking (was in worker.js, now here)
function chunkText(text, maxChars = 800, overlap = 100) {
  const paragraphs = text.split(/\n\n+/).map(p => p.trim()).filter(Boolean);
  const chunks = [];
  let current = '';
  for (const para of paragraphs) {
    const joined = current ? current + '\n\n' + para : para;
    if (joined.length > maxChars && current) {
      chunks.push(current.trim());
      const tail = current.length > overlap ? current.slice(-overlap) : current;
      current = tail + '\n\n' + para;
    } else {
      current = joined;
    }
  }
  if (current.trim()) chunks.push(current.trim());
  const final = [];
  for (const c of chunks) {
    if (c.length <= maxChars * 1.5) { final.push(c); continue; }
    for (let i = 0; i < c.length; i += maxChars - overlap) final.push(c.slice(i, i + maxChars));
  }
  return final;
}

function renderProducts() {
  const sel = $('docProduct');
  PRODUCTS.forEach(p => {
    const o = document.createElement('option');
    o.value = p; o.textContent = p;
    sel.appendChild(o);
  });
}

// ── File name → docId / guess product ──────────────────────────
function nameToId(filename) {
  return filename.replace(/\.[^.]+$/, '').toLowerCase()
    .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 64) || 'doc-' + Date.now();
}

function guessProduct(filename) {
  const lower = filename.toLowerCase();
  return PRODUCTS.find(p => lower.includes(p.toLowerCase())) || null;
}

// ── Parsers ─────────────────────────────────────────────────────
async function parsePDF(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const parts = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const line = content.items.map(it => it.str).join(' ').trim();
    if (line) parts.push(line);
  }
  return parts.join('\n\n');
}

async function parseDocx(file) {
  const buf = await file.arrayBuffer();
  const result = await mammoth.extractRawText({ arrayBuffer: buf });
  return result.value.trim();
}

async function parseExcel(file) {
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: 'array' });
  const parts = [];
  wb.SheetNames.forEach(name => {
    const ws = wb.Sheets[name];
    const csv = XLSX.utils.sheet_to_csv(ws, { blankrows: false });
    if (csv.trim()) parts.push(`=== ${name} ===\n${csv.trim()}`);
  });
  return parts.join('\n\n');
}

async function parseTxt(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result.trim());
    r.onerror = rej;
    r.readAsText(file, 'UTF-8');
  });
}

async function parseFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'pdf') return parsePDF(file);
  if (ext === 'docx') return parseDocx(file);
  if (['xlsx','xls','csv'].includes(ext)) return parseExcel(file);
  if (['txt','md'].includes(ext)) return parseTxt(file);
  throw new Error(`不支援的格式：.${ext}`);
}

function dropState(state, msg) {
  const dz = $('dropZone');
  dz.className = state ? state : '';
  $('dropStatus').textContent = msg || '';
}

async function handleFile(file) {
  if (!file) return;
  dropState('parsing', `解析中：${file.name}...`);
  try {
    const text = await parseFile(file);
    $('docText').value = text;
    // auto-fill ID and name if empty
    if (!$('docId').value) $('docId').value = nameToId(file.name);
    if (!$('docName').value) $('docName').value = file.name.replace(/\.[^.]+$/, '');
    // auto-select product if guessable
    const p = guessProduct(file.name);
    if (p) $('docProduct').value = p;
    const words = text.split(/\s+/).length;
    dropState('done', `✅ 解析完成（約 ${words.toLocaleString()} 字）。請確認內容後按「上傳並建立索引」。`);
  } catch (e) {
    dropState('', '');
    toast('解析失敗：' + e.message, true);
  }
}

// Drop zone events
const dz = $('dropZone');
dz.addEventListener('click', () => $('fileInput').click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('over');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});
$('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) handleFile(file);
  e.target.value = '';
});
$('localPickBtn').addEventListener('click', () => $('fileInput').click());

// ── Google Drive Picker ──────────────────────────────────────────
// Google Workspace native docs → export to these MIME types
const DRIVE_EXPORT = {
  'application/vnd.google-apps.document':    { mime: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document', ext: 'docx' },
  'application/vnd.google-apps.spreadsheet': { mime: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',      ext: 'xlsx' },
  'application/vnd.google-apps.presentation':{ mime: 'application/pdf', ext: 'pdf' },
};

let pickerApiLoaded = false;
function loadPicker() {
  return new Promise((resolve, reject) => {
    if (pickerApiLoaded) return resolve();
    gapi.load('picker', { callback: () => { pickerApiLoaded = true; resolve(); }, onerror: reject });
  });
}

// Use GIS token client to get Drive access token separately from Firebase auth.
// drive.readonly is a sensitive scope — requesting it via Firebase signInWithPopup
// triggers a full OAuth consent screen that returns 403 when the project's consent
// screen is in Testing mode. GIS token client uses the Picker OAuth client directly.
let _gisTokenClient = null;
function requestDriveToken() {
  return new Promise((resolve, reject) => {
    if (driveAccessToken) return resolve(driveAccessToken);
    if (!window.google?.accounts?.oauth2) {
      return reject(new Error('GIS library not loaded — please refresh the page'));
    }
    if (!_gisTokenClient) {
      _gisTokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CONFIG.oauthClientId,
        scope: 'https://www.googleapis.com/auth/drive.readonly',
        callback: resp => {
          if (resp.error) return reject(new Error(resp.error_description || resp.error));
          driveAccessToken = resp.access_token;
          // Clear cached token a minute before expiry so next click re-prompts silently
          setTimeout(() => { driveAccessToken = null; }, (Number(resp.expires_in) - 60) * 1000);
          resolve(driveAccessToken);
        },
        error_callback: err => reject(new Error(err.message || err.type)),
      });
    }
    // prompt: '' = silent reuse if already consented; falls back to consent UI if needed
    _gisTokenClient.requestAccessToken({ prompt: driveAccessToken ? '' : 'consent' });
  });
}

async function openDrivePicker() {
  if (!CONFIG.pickerApiKey || !CONFIG.oauthClientId) {
    toast('Drive Picker 尚未設定（見 CONFIG.pickerApiKey / oauthClientId）', true);
    return;
  }
  try {
    await requestDriveToken();
  } catch (e) { toast('Drive 授權失敗：' + e.message, true); return; }

  await loadPicker();
  const view = new google.picker.DocsView()
    .setIncludeFolders(true)
    .setSelectFolderEnabled(false)
    .setMode(google.picker.DocsViewMode.LIST);
  const picker = new google.picker.PickerBuilder()
    .addView(view)
    .setOAuthToken(driveAccessToken)
    .setDeveloperKey(CONFIG.pickerApiKey)
    .setAppId(CONFIG.oauthClientId.split('-')[0])
    .setCallback(async data => {
      if (data.action !== google.picker.Action.PICKED) return;
      const doc = data.docs[0];
      if (!doc) return;
      try {
        await handleDriveFile(doc);
      } catch (e) {
        toast('Drive 下載 / 解析失敗：' + e.message, true);
        dropState('', '');
      }
    })
    .build();
  picker.setVisible(true);
}

async function handleDriveFile(doc) {
  const { id, name, mimeType } = doc;
  dropState('parsing', `從 Drive 下載：${name}...`);

  let url, filename;
  if (DRIVE_EXPORT[mimeType]) {
    const { mime, ext } = DRIVE_EXPORT[mimeType];
    url = `https://www.googleapis.com/drive/v3/files/${id}/export?mimeType=${encodeURIComponent(mime)}`;
    filename = name + '.' + ext;
  } else {
    url = `https://www.googleapis.com/drive/v3/files/${id}?alt=media`;
    filename = name;
  }

  const res = await fetch(url, { headers: { Authorization: `Bearer ${driveAccessToken}` } });
  if (!res.ok) throw new Error(`Drive HTTP ${res.status}`);
  const blob = await res.blob();
  // Construct a File so existing parsers work unchanged
  const file = new File([blob], filename, { type: blob.type });
  await handleFile(file);
}

$('drivePickBtn').addEventListener('click', openDrivePicker);

// ── Docs list (from Firestore rag_docs) ─────────────────────────
async function loadDocs() {
  $('docsTbody').innerHTML = '<tr><td colspan="7" class="muted" style="text-align:center;padding:16px">載入中...</td></tr>';
  try {
    const snap = await db.collection('rag_docs').orderBy('uploadedAt', 'desc').get();
    const tbody = $('docsTbody');
    tbody.innerHTML = '';
    $('docsEmpty').style.display = snap.empty ? 'block' : 'none';
    snap.forEach(doc => {
      const d = doc.data();
      const tr = document.createElement('tr');
      const when = d.uploadedAt?.toDate ? d.uploadedAt.toDate().toLocaleString('zh-TW')
        : (d.uploadedAt ? new Date(d.uploadedAt).toLocaleString('zh-TW') : '-');
      tr.innerHTML = `
        <td>${escapeHtml(d.name || doc.id)}</td>
        <td><code style="font-size:12px;color:rgba(255,255,255,0.55)">${escapeHtml(doc.id)}</code></td>
        <td><span class="pill">${escapeHtml(d.product || 'general')}</span></td>
        <td>${d.chunkCount || 0}</td>
        <td class="muted">${when}</td>
        <td><span class="pill ok">ready</span></td>
        <td><button class="danger" data-id="${escapeHtml(doc.id)}">刪除</button></td>
      `;
      tbody.appendChild(tr);
    });
    tbody.querySelectorAll('button.danger').forEach(b => {
      b.addEventListener('click', () => deleteDoc(b.dataset.id));
    });
  } catch (e) {
    $('docsTbody').innerHTML = '';
    toast('載入失敗：' + e.message, true);
  }
}

async function deleteDoc(id) {
  if (!confirm(`確定刪除「${id}」？此動作無法復原。`)) return;
  try {
    // delete all chunks with this docId (max 500 per batch)
    const snap = await db.collection('rag_chunks').where('docId', '==', id).get();
    if (!snap.empty) {
      const batch = db.batch();
      snap.docs.forEach(d => batch.delete(d.ref));
      await batch.commit();
    }
    await db.collection('rag_docs').doc(id).delete();
    toast(`已刪除（${snap.size} chunks）`);
    loadDocs();
  } catch (e) {
    toast('刪除失敗：' + e.message, true);
  }
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── Auth (Google Sign-In — Drive scope handled separately via GIS) ──
function showAuthed(user) {
  currentUser = user;
  $('authStatus').textContent = `已登入：${user.email}`;
  $('authBlock').style.display = 'none';
  $('mainBlock').style.display = 'block';
  $('logoutBtn').style.display = 'inline-block';
  loadDocs();
}

function showLoggedOut() {
  currentUser = null;
  driveAccessToken = null;
  $('authStatus').textContent = '';
  $('authBlock').style.display = 'block';
  $('mainBlock').style.display = 'none';
  $('logoutBtn').style.display = 'none';
}

$('googleLoginBtn').addEventListener('click', async () => {
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    // Drive scope is handled separately via GIS token client when Picker is opened,
    // so we don't request it here — avoids the sensitive-scope 403 on login.
    const result = await auth.signInWithPopup(provider);
    showAuthed(result.user);
  } catch (e) {
    toast('登入失敗：' + e.message, true);
  }
});

$('logoutBtn').addEventListener('click', async () => {
  await auth.signOut();
  showLoggedOut();
});

// Restore existing Firebase session on page load (Drive token will need re-login)
auth.onAuthStateChanged(user => {
  if (user && !currentUser) {
    // Session restored but no fresh Drive token — show authed, but Drive Picker will re-prompt
    showAuthed(user);
  } else if (!user) {
    showLoggedOut();
  }
});

$('refreshBtn').addEventListener('click', loadDocs);

// ── Upload (chunk → embed via Worker → write Firestore) ──────────
$('uploadBtn').addEventListener('click', async () => {
  const docId = $('docId').value.trim();
  const name = $('docName').value.trim();
  const product = $('docProduct').value;
  const text = $('docText').value.trim();
  if (!docId || !name || !text) { toast('文件 ID、名稱、內容皆為必填', true); return; }
  if (!/^[\w\-]+$/.test(docId)) { toast('文件 ID 僅允許英數字、底線、連字號', true); return; }
  if (!currentUser) { toast('請先 Google 登入', true); return; }

  const btn = $('uploadBtn');
  btn.disabled = true;
  const setStatus = s => $('uploadStatus').textContent = s;

  try {
    const chunks = chunkText(text);
    if (!chunks.length) throw new Error('內容切塊後為空');

    // Embed each chunk sequentially (Workers AI free tier rate limit friendly)
    const vectors = [];
    for (let i = 0; i < chunks.length; i++) {
      setStatus(`建立 embedding ${i + 1} / ${chunks.length}...`);
      vectors.push(await embedText(chunks[i]));
    }

    // Write chunks to Firestore in batches of 400 (Firestore batch limit 500)
    setStatus(`寫入 Firestore（${chunks.length} chunks）...`);
    if (!window._fsVector) { toast('頁面尚未就緒，請重新整理後再試', true); return; }
    const serverTs = firebase.firestore.FieldValue.serverTimestamp();
    for (let start = 0; start < chunks.length; start += 400) {
      const batch = db.batch();
      for (let i = start; i < Math.min(start + 400, chunks.length); i++) {
        const ref = db.collection('rag_chunks').doc(`${docId}_${i}`);
        batch.set(ref, {
          docId, docName: name, chunkIndex: i,
          product: product || 'general',
          text: chunks[i],
          embedding: window._fsVector(vectors[i]),
          createdAt: serverTs,
        });
      }
      await batch.commit();
    }

    // Write doc metadata
    await db.collection('rag_docs').doc(docId).set({
      name, product: product || 'general',
      chunkCount: chunks.length,
      uploadedAt: serverTs,
      uploader: currentUser.email,
    });

    toast(`✅ 已建立 ${chunks.length} 個向量`);
    $('docText').value = '';
    $('docId').value = '';
    $('docName').value = '';
    dropState('', '');
    loadDocs();
  } catch (e) {
    toast('上傳失敗：' + e.message, true);
  } finally {
    btn.disabled = false;
    setStatus('');
  }
});

// ── Init ──────────────────────────────────────────────────────────
renderProducts();
// onAuthStateChanged above handles post-load auth UI state
</script>
</body>
</html>
